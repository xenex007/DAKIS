<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DAKIS by XeneX - Assistant IA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            --bg-primary: #eef2f5;
            --bg-secondary: #f0f4f8;
            --bg-sidebar: linear-gradient(180deg, #1a2f3d 0%, #2d3e4b 100%);
            --text-primary: #1e2a32;
            --text-sidebar: #eef2f5;
            --accent: #e8b55a;
            --accent-hover: #f4c430;
            --border-light: #dce5ec;
            --bubble-user: linear-gradient(135deg, #e8b55a 0%, #f4c430 100%);
            --bubble-bot: #ffffff;
            --input-bg: #fafdff;
            --danger: #5c3e3e;
            --danger-hover: #9b5a5a;
            --success: #27ae60;
            --shadow: rgba(0,0,0,0.05);
        }

        body.theme-cyber {
            --bg-primary: #020509; --bg-secondary: #050d18;
            --bg-sidebar: linear-gradient(180deg, #0a0f1a 0%, #0d1525 100%);
            --text-primary: #00e5ff; --text-sidebar: #00e5ff; --accent: #00ff9d; --accent-hover: #00ff9d;
            --border-light: #1a3455; --bubble-user: linear-gradient(135deg, #00e5ff22, #00ff9d11);
            --bubble-bot: #0d1e33; --input-bg: #091525; --danger: #ff3366; --danger-hover: #ff6680;
            --success: #00ff9d; --shadow: rgba(0,229,255,0.1);
        }
        body.theme-midnight {
            --bg-primary: #09090f; --bg-secondary: #0d0d18;
            --bg-sidebar: linear-gradient(180deg, #0a0a14 0%, #0f0f1d 100%);
            --text-primary: #9b8fff; --text-sidebar: #9b8fff; --accent: #ff8aff; --accent-hover: #ffaaff;
            --border-light: #252540; --bubble-user: linear-gradient(135deg, #9b8fff33, #ff8aff22);
            --bubble-bot: #131320; --input-bg: #0d0d18; --danger: #ff6b6b; --danger-hover: #ff8e8e;
            --success: #6bffb0; --shadow: rgba(155,143,255,0.1);
        }
        body.theme-glass {
            --bg-primary: rgba(255,255,255,0.92); --bg-secondary: rgba(240,244,248,0.88);
            --bg-sidebar: linear-gradient(135deg, rgba(26,47,61,0.85), rgba(45,62,75,0.9));
            --text-primary: #1e2a32; --text-sidebar: #ffffff; --accent: #4a90e2; --accent-hover: #5ba3f5;
            --border-light: rgba(255,255,255,0.3); --bubble-user: linear-gradient(135deg, #4a90e2, #5ba3f5);
            --bubble-bot: rgba(255,255,255,0.85); --input-bg: rgba(255,255,255,0.9);
            --danger: #e74c3c; --danger-hover: #ec7063; --success: #2ecc71; --shadow: rgba(0,0,0,0.1);
        }
        body.theme-apple {
            --bg-primary: #f5f5f7; --bg-secondary: #ffffff;
            --bg-sidebar: linear-gradient(180deg, #ffffff 0%, #f5f5f7 100%);
            --text-primary: #1d1c1f; --text-sidebar: #1d1c1f; --accent: #007aff; --accent-hover: #0051d5;
            --border-light: #e9e9ef; --bubble-user: #007aff; --bubble-bot: #e9e9ef;
            --input-bg: #ffffff; --danger: #ff3b30; --danger-hover: #ff6b62; --success: #34c759; --shadow: rgba(0,0,0,0.05);
        }
        body.theme-velvet {
            --bg-primary: #1a0b2e; --bg-secondary: #2d1b4e;
            --bg-sidebar: linear-gradient(180deg, #2d1b4e 0%, #1a0b2e 100%);
            --text-primary: #e8d5ff; --text-sidebar: #ffd700; --accent: #c77dff; --accent-hover: #dd9eff;
            --border-light: #5a3a8a; --bubble-user: linear-gradient(135deg, #c77dff, #a855f7);
            --bubble-bot: #3a2a5a; --input-bg: #2d1b4e; --danger: #ff6b9d; --danger-hover: #ff8db3;
            --success: #ffd700; --shadow: rgba(199,125,255,0.2);
        }
        body.theme-contrast {
            --bg-primary: #000000; --bg-secondary: #000000; --bg-sidebar: #000000;
            --text-primary: #ffff00; --text-sidebar: #ffff00; --accent: #00ff00; --accent-hover: #00ff88;
            --border-light: #ffff00; --bubble-user: #00ff00; --bubble-bot: #000000; --input-bg: #000000;
            --danger: #ff0000; --danger-hover: #ff4444; --success: #00ff00; --shadow: none;
        }
        body.theme-contrast button, body.theme-contrast .bubble,
        body.theme-contrast input, body.theme-contrast textarea { border: 2px solid #ffff00 !important; }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .app-container { display: flex; height: 100%; width: 100%; background: var(--bg-secondary); }

        body.focus-mode .sidebar { transform: translateX(-100%); }
        body.focus-mode .main-chat { width: 100%; }

        .sidebar {
            width: 320px; min-width: 320px;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            display: flex; flex-direction: column;
            transition: transform 0.2s ease;
            box-shadow: 2px 0 12px var(--shadow);
            z-index: 10;
            max-height: 100vh; height: 100vh;
            overflow-y: auto; overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-track { background: rgba(0,0,0,0.15); border-radius: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(232,181,90,0.5); border-radius: 4px; }
        .sidebar::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        .sidebar { scrollbar-width: thin; scrollbar-color: rgba(232,181,90,0.4) rgba(0,0,0,0.15); }

        .dakis-logo-container {
            background: transparent; text-align: center;
            padding: 1.5rem 1rem 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .logo-dakis {
            font-family: 'Orbitron', 'Montserrat', sans-serif;
            font-size: 2.5rem; font-weight: 900; letter-spacing: 4px;
            background: linear-gradient(135deg, #ff3b00 0%, #ff7400 50%, #ff9d00 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
            filter: drop-shadow(0 0 1px #000) drop-shadow(0 0 1px #000);
            display: inline-block; position: relative;
        }
        .logo-dakis::before {
            content: 'DAKIS'; position: absolute; inset: 0;
            font-family: 'Orbitron', 'Montserrat', sans-serif;
            font-size: inherit; font-weight: 900; letter-spacing: inherit;
            -webkit-text-stroke: 3px #000000;
            -webkit-text-fill-color: transparent; color: transparent;
            background: none; z-index: -1;
        }
        .logo-arabic { font-family: 'Cairo','Almarai','Tajawal',sans-serif; font-size: 0.9rem; font-weight: 600; color: #ffb347; text-shadow: 1px 1px 0 #000,-1px -1px 0 #000,0 1px 0 #000; letter-spacing: 1px; margin-top: 6px; display: block; }
        .logo-by { font-family: 'Orbitron','Montserrat',sans-serif; font-size: 0.65rem; font-weight: 500; color: #d4a373; text-shadow: 1px 1px 0 #000; letter-spacing: 1px; margin-top: 4px; display: block; }

        .theme-selector { margin: 1rem; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 12px; font-size: 0.8rem; flex-shrink: 0; }
        .theme-selector select { width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid var(--border-light); border-radius: 8px; color: var(--text-primary); cursor: pointer; }

        .settings-toggle { background: var(--accent); border: none; margin: 0 1rem 0; padding: 12px 20px; border-radius: 12px; font-weight: 600; color: #1f2e38; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem; flex-shrink: 0; width: calc(100% - 2rem); }
        .settings-toggle:hover { transform: translateY(-2px); filter: brightness(1.05); }

        .config-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), padding 0.3s ease, opacity 0.3s ease; background: rgba(0,0,0,0.2); opacity: 0; margin: 0; border-radius: 0; flex-shrink: 0; }
        .config-panel.open { max-height: 700px; opacity: 1; overflow: visible; margin-bottom: 0.5rem; }

        .config-section { padding: 1.2rem; border-bottom: 1px solid var(--border-light); }
        .config-label { font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; display: block; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }

        .provider-badge { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; margin-bottom: 10px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: all 0.2s; }
        .provider-badge:hover { border-color: var(--accent); }
        .provider-info { flex: 1; }
        .provider-name { font-weight: 600; font-size: 0.85rem; }
        .provider-limit { font-size: 0.65rem; opacity: 0.7; }
        .key-status { font-size: 0.7rem; padding: 4px 8px; border-radius: 20px; background: #3b5c6e; font-weight: 600; }
        .key-status.active { background: var(--success); color: white; }
        .change-key-btn { background: transparent; border: 1px solid var(--accent); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; font-weight: 600; color: var(--accent); transition: all 0.2s; }
        .change-key-btn:hover { background: var(--accent); color: #1f2e38; }

        .hidden-api-input { max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease, padding 0.3s ease; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 0 10px; width: 100%; margin-top: 0; }
        .hidden-api-input.show { max-height: 200px; opacity: 1; padding: 10px; margin-top: 10px; }
        .api-input-small { width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid var(--border-light); border-radius: 8px; color: var(--text-primary); font-size: 0.8rem; margin-bottom: 8px; }
        .save-provider-btn { background: var(--accent); border: none; padding: 8px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; color: #1f2e38; }
        .model-select { width: 100%; background: var(--input-bg); border: 1px solid var(--border-light); border-radius: 10px; padding: 10px; color: var(--text-primary); font-weight: 500; font-size: 0.85rem; cursor: pointer; }

        .config-spacer { height: 0.8rem; flex-shrink: 0; }

        .agents-section { margin: 0 1rem 1rem; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; flex-shrink: 0; }
        .agents-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .agents-list { max-height: 220px; overflow-y: auto; }
        .agents-list::-webkit-scrollbar { width: 4px; }

        .dakis-general-btn {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 10px 15px;
            font-weight: 700;
            color: #1f2e38;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-bottom: 10px;
        }
        .dakis-general-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .dakis-general-btn.active { border-color: var(--success); box-shadow: 0 0 10px rgba(39, 174, 96, 0.3); }

        .agent-radio {
            width: 20px; height: 20px; border-radius: 50%;
            border: 2px solid var(--border-light); background: transparent;
            cursor: pointer; transition: all 0.2s; flex-shrink: 0; position: relative;
        }
        .agent-radio:hover { border-color: var(--accent); }
        .agent-radio.active { border-color: var(--success); background: var(--success); }
        .agent-radio.active::after {
            content: '✓'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: white; font-size: 0.7rem; font-weight: 700;
        }

        .agent-item {
            background: rgba(0,0,0,0.3); padding: 8px 10px; border-radius: 8px;
            margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
            border-left: 3px solid transparent; display: flex; align-items: center; gap: 8px;
        }
        .agent-item:hover { transform: translateX(3px); }
        .agent-item.active { border-left-color: var(--accent); background: rgba(0,0,0,0.4); }
        .agent-item-info { flex: 1; min-width: 0; }
        .agent-name { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .agent-desc { font-size: 0.7rem; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .agent-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .agent-edit-btn {
            background: rgba(232,181,90,0.15); border: 1px solid var(--accent);
            color: var(--accent); border-radius: 6px; padding: 3px 7px;
            font-size: 0.7rem; cursor: pointer; transition: all 0.15s; line-height: 1;
        }
        .agent-edit-btn:hover { background: var(--accent); color: #1f2e38; }
        .agent-delete-btn {
            background: rgba(220,53,69,0.15); border: 1px solid #dc3545;
            color: #dc3545; border-radius: 6px; width: 22px; height: 22px;
            font-size: 0.75rem; cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; justify-content: center; font-weight: 700; line-height: 1;
        }
        .agent-delete-btn:hover { background: #dc3545; color: white; }

        .edit-agent-panel {
            background: rgba(0,0,0,0.35); border-radius: 10px; padding: 12px;
            margin-top: 8px; border: 1px solid var(--border-light); display: none;
        }
        .edit-agent-panel.show { display: block; animation: fadeIn 0.2s ease; }
        .edit-agent-panel input, .edit-agent-panel textarea {
            width: 100%; padding: 7px 10px; background: var(--input-bg);
            border: 1px solid var(--border-light); border-radius: 7px;
            color: var(--text-primary); font-size: 0.8rem; margin-bottom: 7px; font-family: inherit;
        }
        .edit-agent-panel textarea { resize: vertical; min-height: 70px; }
        .edit-agent-actions { display: flex; gap: 6px; }
        .edit-save-btn { background: var(--accent); border: none; border-radius: 7px; padding: 6px 12px; font-weight: 700; color: #1f2e38; cursor: pointer; font-size: 0.8rem; flex: 1; }
        .edit-cancel-btn { background: transparent; border: 1px solid var(--border-light); border-radius: 7px; padding: 6px 12px; color: var(--text-sidebar); cursor: pointer; font-size: 0.8rem; }

        .memory-section { margin: 0 1rem 1rem; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; flex-shrink: 0; }
        .memory-list { max-height: 150px; overflow-y: auto; font-size: 0.75rem; margin-bottom: 8px; }
        .memory-list::-webkit-scrollbar { width: 4px; }
        .memory-item { padding: 5px 0; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; }
        .memory-input-row { display: flex; gap: 5px; margin-top: 8px; }
        .memory-input-row input { flex: 1; padding: 6px; background: var(--input-bg); border: 1px solid var(--border-light); border-radius: 6px; color: var(--text-primary); }

        .history-search { margin: 0 1rem 0.5rem; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .history-search input { width: 100%; padding: 8px 12px; background: var(--input-bg); border: 1px solid var(--border-light); border-radius: 6px; color: var(--text-primary); font-size: 0.85rem; }

        .history-list { padding: 0.8rem; overflow-y: auto; min-height: 60px; flex-shrink: 1; }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-item { background: rgba(0,0,0,0.2); margin-bottom: 10px; padding: 12px; border-radius: 12px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; position: relative; }
        .history-item:hover { transform: translateX(3px); }
        .history-item.active { border-left-color: var(--accent); }
        .history-title { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 30px; }
        .history-date { font-size: 0.7rem; opacity: 0.6; }
        .history-delete-btn {
            position: absolute; top: 8px; right: 8px;
            background: transparent; border: 1px solid var(--danger);
            color: var(--danger); border-radius: 50%;
            width: 22px; height: 22px; font-size: 0.75rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-weight: 700; line-height: 1; transition: all 0.15s; opacity: 0;
        }
        .history-item:hover .history-delete-btn { opacity: 1; }
        .history-delete-btn:hover { background: var(--danger); color: white; }

        .new-chat-btn, .wizard-agent-btn { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%); border: none; margin: 0.8rem 1rem; padding: 12px; border-radius: 12px; font-weight: 700; color: #1f2e38; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px; flex-shrink: 0; }
        .new-chat-btn:hover, .wizard-agent-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .clear-all-btn { background: var(--danger); border: none; margin: 0 1rem 1.5rem; padding: 10px; border-radius: 12px; font-weight: 600; color: white; cursor: pointer; flex-shrink: 0; transition: all 0.2s; }
        .clear-all-btn:hover { filter: brightness(1.15); }

        .agents-import-export { display: flex; gap: 5px; margin-bottom: 10px; }
        .agents-import-export button { flex: 1; padding: 6px; font-size: 0.75rem; border-radius: 6px; border: 1px solid var(--border-light); background: rgba(0,0,0,0.2); color: var(--text-sidebar); cursor: pointer; transition: all 0.2s; }
        .agents-import-export button:hover { background: var(--accent); color: #1f2e38; }

        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--bg-secondary); overflow: hidden; }
        .chat-header { background: var(--bg-primary); padding: 1rem 2rem; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: center; gap: 12px; position: relative; }
        .chat-header h3 span { color: var(--accent); }
        .clear-current-btn {
            position: absolute; right: 2rem; top: 50%; transform: translateY(-50%);
            background: transparent; border: 1px solid var(--border-light);
            border-radius: 8px; padding: 6px 12px; font-size: 0.8rem;
            color: var(--text-primary); cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 4px;
        }
        .clear-current-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }
        .focus-mode-btn {
            position: absolute; left: 2rem; top: 50%; transform: translateY(-50%);
            background: transparent; border: 1px solid var(--border-light);
            border-radius: 8px; padding: 6px 12px; font-size: 0.8rem;
            color: var(--text-primary); cursor: pointer; transition: all 0.2s;
        }
        .focus-mode-btn:hover { background: var(--accent); color: #1f2e38; }

        .messages-area { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.2rem; }
        .messages-area::-webkit-scrollbar { width: 6px; }
        .messages-area::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 3px; }
        .messages-area::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        .message { max-width: 85%; display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-message { align-self: flex-end; }
        .bot-message { align-self: flex-start; }

        .bubble { padding: 1rem 1.4rem; border-radius: 20px; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; }
        .user-bubble { background: var(--bubble-user); color: #1f2e38; border-bottom-right-radius: 6px; }
        .bot-bubble { background: var(--bubble-bot); color: var(--text-primary); border-bottom-left-radius: 6px; border: 1px solid var(--border-light); }

        .bubble table { border-collapse: collapse; margin: 10px 0; width: 100%; }
        .bubble th, .bubble td { border: 1px solid var(--border-light); padding: 8px 12px; text-align: left; }
        .bubble th { background: var(--bg-secondary); font-weight: 600; }
        .bubble tr:nth-child(even) { background: rgba(0,0,0,0.02); }

        .bubble pre { background: #282c34; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 10px 0; }
        .bubble code { font-family: 'Consolas', 'Monaco', monospace; font-size: 0.9rem; }

        .msg-actions { display: flex; gap: 8px; margin-top: 6px; opacity: 0; transition: opacity 0.2s; flex-wrap: wrap; }
        .message:hover .msg-actions { opacity: 1; }
        .msg-action-btn { background: transparent; border: 1px solid var(--border-light); border-radius: 12px; padding: 2px 8px; font-size: 0.7rem; cursor: pointer; color: var(--text-primary); }
        .msg-action-btn:hover { background: var(--accent); color: #1f2e38; }

        .streaming-cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent); margin-left: 2px; vertical-align: middle; animation: blink 0.7s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

<script>
// =====================================================
// CONFIGURATION DES BIBLIOTHÈQUES
// =====================================================
if (window.pdfjsLib) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}
hljs.configure({ ignoreUnescapedHTML: true });

// =====================================================
// CONFIG PROVIDERS
// =====================================================
const providersConfig = {
    mistral: { name: "Mistral AI", baseURL: "https://api.mistral.ai/v1/chat/completions", models: ["mistral-tiny","mistral-small","mistral-medium","mistral-large-latest"], freeLimit: "~200 req/jour", signupUrl: "https://console.mistral.ai", headers: k => ({ "Authorization": `Bearer ${k}`, "Content-Type": "application/json" }) },
    groq:    { name: "Groq", baseURL: "https://api.groq.com/openai/v1/chat/completions", models: ["llama-3.1-70b-versatile","mixtral-8x7b-32768"], freeLimit: "Très généreux", signupUrl: "https://console.groq.com", headers: k => ({ "Authorization": `Bearer ${k}`, "Content-Type": "application/json" }) },
    deepseek:{ name: "DeepSeek", baseURL: "https://api.deepseek.com/v1/chat/completions", models: ["deepseek-chat"], freeLimit: "Généreux", signupUrl: "https://platform.deepseek.com", headers: k => ({ "Authorization": `Bearer ${k}`, "Content-Type": "application/json" }) },
    openrouter:{ name: "OpenRouter", baseURL: "https://openrouter.ai/api/v1/chat/completions", models: ["openrouter/free","deepseek/deepseek-chat"], freeLimit: "Illimité", signupUrl: "https://openrouter.ai", headers: k => ({ "Authorization": `Bearer ${k}`, "Content-Type": "application/json" }) }
};

// =====================================================
// STATE
// =====================================================
let currentApiKeys = {};
let activeProvider = "mistral";
let currentSessionId = Date.now().toString();
let sessions = [];
let attachedFiles = [];
let agents = [];
let globalMemories = [];
let currentAgent = null;
let editingAgentId = null;

// =====================================================
// DOM REFS
// =====================================================
const burgerBtn         = document.getElementById('burgerBtn');

// =====================================================
// UTILS
// =====================================================
function setStatus(msg, isError=false) {
    statusMsgSpan.innerHTML = msg;
    statusMsgSpan.style.color = isError ? '#e74c3c' : 'var(--success)';
    setTimeout(() => { if (statusMsgSpan.innerHTML === msg) statusMsgSpan.innerHTML = ''; }, 5000);
}
function escapeHtml(s) { return (s||'').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
function setTheme(t) { document.body.className = ''; if (t && t !== 'theme-dakis') document.body.classList.add(t); localStorage.setItem('dakis_theme', t); }

themeSelect.addEventListener('change', () => setTheme(themeSelect.value));
const savedTheme = localStorage.getItem('dakis_theme');
if (savedTheme) { setTheme(savedTheme); themeSelect.value = savedTheme; }
else themeSelect.value = 'theme-dakis';

if (burgerBtn) burgerBtn.onclick = () => sidebar.classList.toggle('open');

settingsToggle.addEventListener('click', (e) => {
    e.preventDefault(); e.stopPropagation();
    const isOpen = configPanel.classList.toggle('open');
    settingsToggle.innerHTML = isOpen ? '🔼 Masquer Paramètres' : '️ Paramètres API';
    if (isOpen) setTimeout(() => settingsToggle.scrollIntoView({ behavior: 'smooth', block: 'start' }), 420);
});

function updateCharCounter() {
    if (!charCounter || !userInput) return;
    const len = userInput.value.length;
    charCounter.textContent = `${len} caractère${len > 1 ? 's' : ''}`;
    if (len > 4000) {
        charCounter.classList.add('warning');
        charCounter.textContent += ' ⚠️ (risque de dépassement de contexte)';
    } else {
        charCounter.classList.remove('warning');
    }
}
if (userInput) {
    userInput.addEventListener('input', updateCharCounter);
    userInput.addEventListener('keydown', updateCharCounter);
}

// =====================================================
// API KEYS
// =====================================================
function loadApiKeys() { try { currentApiKeys = JSON.parse(localStorage.getItem('dakis_keys') || '{}'); } catch(e) {} renderProvidersUI(); updateModelSelect(); }
function saveApiKeys() { localStorage.setItem('dakis_keys', JSON.stringify(currentApiKeys)); }

function renderProvidersUI() {
    providersContainer.innerHTML = '';
    for (const [provider, conf] of Object.entries(providersConfig)) {
        const hasKey = !!(currentApiKeys[provider]?.length);
        const div = document.createElement('div');
        div.className = 'provider-badge';
        div.innerHTML = `
            <div class="provider-info">
                <div class="provider-name">${conf.name}</div>
                <div class="provider-limit">${conf.freeLimit}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <div class="key-status ${hasKey?'active':''}">${hasKey?'✓':'○'}</div>
                <button class="change-key-btn" data-provider="${provider}">${hasKey?'Modifier':'Ajouter'}</button>
            </div>
            <div class="hidden-api-input" id="input-${provider}">
                <input type="password" id="key-${provider}" class="api-input-small" placeholder="Clé API ${conf.name}">
                <a href="${conf.signupUrl}" target="_blank" style="display:block;font-size:0.7rem;color:var(--accent);margin-bottom:8px;">→ Obtenir une clé gratuite</a>
                <button class="save-provider-btn" data-save="${provider}">💾 Sauvegarder</button>
            </div>`;
        providersContainer.appendChild(div);
        const inputDiv = div.querySelector('.hidden-api-input');
        div.querySelector('.change-key-btn').addEventListener('click', e => {
            e.stopPropagation();
            document.querySelectorAll('.hidden-api-input').forEach(i => { if (i !== inputDiv) i.classList.remove('show'); });
            inputDiv.classList.toggle('show');
            if (inputDiv.classList.contains('show')) setTimeout(() => inputDiv.scrollIntoView({ behavior:'smooth', block:'nearest' }), 360);
        });
        div.querySelector('.save-provider-btn').addEventListener('click', () => {
            const k = div.querySelector(`#key-${provider}`).value.trim();
            if (k) { currentApiKeys[provider] = k; saveApiKeys(); setStatus(`✅ Clé ${conf.name} sauvegardée`); inputDiv.classList.remove('show'); div.querySelector(`#key-${provider}`).value=''; renderProvidersUI(); updateModelSelect(); }
            else setStatus('❌ Clé invalide', true);
        });
    }
}

function updateModelSelect() {
    modelSelect.innerHTML = '<option value="">Choisir un modèle...</option>';
    for (const [provider, conf] of Object.entries(providersConfig)) {
        if (currentApiKeys[provider]) {
            const og = document.createElement('optgroup'); og.label = conf.name;
            conf.models.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; o.dataset.provider = provider; og.appendChild(o); });
            modelSelect.appendChild(og);
        }
    }
    if (modelSelect.options.length > 1) modelSelect.selectedIndex = 1;
}

function getProviderForModel(model) {
    for (const [provider, conf] of Object.entries(providersConfig)) if (conf.models.includes(model)) return provider;
    return activeProvider;
}

function saveSessions() {
    try {
        localStorage.setItem('dakis_sessions', JSON.stringify(sessions));
    } catch(e) {
        if (e.name === 'QuotaExceededError' || e.code === 22) {
            setStatus('⚠️ Stockage plein ! Supprimez des anciennes discussions.', true);
            while (sessions.length > 3) {
                sessions.pop();
                try {
                    localStorage.setItem('dakis_sessions', JSON.stringify(sessions));
                    setStatus('✅ Anciennes discussions supprimées pour libérer de l\'espace', false);
                    return;
                } catch(e2) {}
            }
        }
    }
}
function saveCurrentMessages(messages) {
    const idx = sessions.findIndex(s=>s.id===currentSessionId);
    if (idx !== -1) {
        sessions[idx].messages = messages;
        const fu = messages.find(m=>m.role==='user');
        if (fu) sessions[idx].title = fu.content.substring(0,40) + (fu.content.length>40?'…':'');
        saveSessions(); renderHistory();
    }
}
function loadSessionMessages(id) { const s = sessions.find(s=>s.id===id); if (s) { currentSessionId=id; renderMessages(s.messages); } renderHistory(); }

function renderMessages(messages) {
    if (!messagesContainer) return;
    messagesContainer.innerHTML = '';
    messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.role==='user'?'user-message':'bot-message'}`;
        div.innerHTML = `<div class="bubble ${msg.role==='user'?'user-bubble':'bot-bubble'}">${msg.role==='user'?escapeHtml(msg.content):marked.parse(msg.content)}</div>
            <div class="msg-actions">
                ${msg.role==='assistant'?`
                    <button class="msg-action-btn" onclick="window.copyMessage(${msg.timestamp})">📋 Copier</button>
                    <button class="msg-action-btn" onclick="window.saveToMemory(${msg.timestamp})">🧠 Mémoriser</button>
                    <button class="msg-action-btn" onclick="window.regenerateMessage(${msg.timestamp})">🔄 Régénérer</button>
                    <button class="msg-action-btn" onclick="window.exportMessage(${msg.timestamp})">💾 Export</button>
                `:''}
            </div>
            <div style="font-size:0.7rem;opacity:0.6;margin-top:4px;">${new Date(msg.timestamp||Date.now()).toLocaleTimeString()}</div>`;
        messagesContainer.appendChild(div);

}

window.copyMessage = ts => { const msg = sessions.find(s=>s.id===currentSessionId)?.messages.find(m=>m.timestamp===ts); if (msg) { navigator.clipboard.writeText(msg.content); setStatus('Copié !'); } };
window.saveToMemory = ts => { const msg = sessions.find(s=>s.id===currentSessionId)?.messages.find(m=>m.timestamp===ts); if (msg) { globalMemories.push({id:Date.now().toString(),content:msg.content.substring(0,200),created:Date.now()}); saveMemory(); renderMemory(); setStatus('Mémorisé !'); } };

window.regenerateMessage = async (ts) => {
    const sess = sessions.find(s=>s.id===currentSessionId);
    if (!sess) return;
    const msgIdx = sess.messages.findIndex(m=>m.timestamp===ts);
    if (msgIdx === -1) return;
    
    let userMsg = '';
    for (let i = msgIdx - 1; i >= 0; i--) {
        if (sess.messages[i].role === 'user') {
            userMsg = sess.messages[i].content;
            break;
        }
    }
    
    if (!userMsg) {
        setStatus('❌ Pas de message utilisateur trouvé', true);
        return;
    }
    
    sess.messages.splice(msgIdx, 1);
    saveSessions();
    renderMessages(sess.messages);
    
    userInput.value = userMsg;
    handleSend();
};

window.exportMessage = (ts) => {
    const msg = sessions.find(s=>s.id===currentSessionId)?.messages.find(m=>m.timestamp===ts);
    if (!msg) return;
    
    const format = prompt('Format d\'export ? (1: PDF, 2: TXT, 3: Markdown)', '1');
    if (!format) return;
    
    if (format === '1') {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(msg.content, 10, 10);
        doc.save(`message_${ts}.pdf`);
    } else if (format === '2') {
        const blob = new Blob([msg.content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `message_${ts}.txt`;
        a.click();
        URL.revokeObjectURL(url);
    } else if (format === '3') {
        const blob = new Blob([msg.content], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `message_${ts}.md`;
        a.click();
        URL.revokeObjectURL(url);
    }
    setStatus('✅ Message exporté');
};

// =====================================================
async function performOCR(imageDataUrl) {
    if (!window.Tesseract) throw new Error('Tesseract.js non chargé');
    const result = await Tesseract.recognize(
        imageDataUrl,
        'fra+ara+eng',
        {
            logger: m => {
                if (m.status === 'recognizing text') {
                    setStatus(` OCR en cours : ${Math.round(m.progress * 100)}%`);
                }
            }
        }
    );
    return result.data.text.trim();
}

async function extractTextFromPDF(dataURL) {
    if (!window.pdfjsLib) throw new Error('pdf.js non chargé');
    const base64 = dataURL.split(',')[1];
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

    const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
    let fullText = '';
    const numPages = Math.min(pdf.numPages, 30);
    
    for (let i = 1; i <= numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const pageText = content.items.map(item => item.str).join(' ');
        fullText += `\n--- Page ${i} ---\n${pageText}`;
    }
    return fullText.trim();
}

async function extractTextFromPDFWithOCR(pdfDataUrl) {
    if (!window.pdfjsLib || !window.Tesseract) throw new Error('Bibliothèques OCR non chargées');
    
    const base64 = pdfDataUrl.split(',')[1];
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

    const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
    let fullText = '';
    const numPages = Math.min(pdf.numPages, 5);
    
    setStatus(` PDF scanné détecté. OCR sur ${numPages} pages max...`);
    
    for (let i = 1; i <= numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 2.0 });
        
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        
        await page.render({ canvasContext: context, viewport: viewport }).promise;
        const imageData = canvas.toDataURL('image/png');
        
        setStatus(`🔍 OCR Page ${i}/${numPages}...`);
        const ocrResult = await performOCR(imageData);
        fullText += `\n--- Page ${i} (OCR) ---\n${ocrResult}`;
    }
    
    if (pdf.numPages > 5) {
        fullText += `\n\n[Note: PDF de ${pdf.numPages} pages. Seules les 5 premières ont été analysées par OCR pour des raisons de performance.]`;
    }
    return fullText.trim();
}

async function processFile(file) {
    if (file.size > 20*1024*1024) { setStatus('❌ Fichier trop volumineux (>20Mo)', true); return; }
    const fileEntry = { fileName: file.name, status: 'loading', type: null };
    attachedFiles.push(fileEntry);
    renderFileList();

    try {
        if (file.type === 'application/pdf') {
            await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async e => {
                    fileEntry.dataURL = e.target.result;
                    fileEntry.mimeType = file.type;
                    fileEntry.type = 'pdf';
                    try {
                        setStatus(`📖 Extraction du texte de ${file.name}...`);
                        fileEntry.textContent = await extractTextFromPDF(e.target.result);
                        
                        if (!fileEntry.textContent || fileEntry.textContent.trim().length < 50) {
                            fileEntry.textContent = await extractTextFromPDFWithOCR(e.target.result);
                        }
                        
                        fileEntry.status = 'ready';
                        renderFileList();
                        setStatus(`✅ ${file.name} chargé (${fileEntry.textContent.length} caractères)`);
                    } catch(err) {
                        fileEntry.status = 'error';
                        fileEntry.errorMsg = err.message;
                        renderFileList();
                        setStatus(`❌ Erreur PDF: ${err.message}`, true);
                    }
                    resolve();
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        } 
        else if (file.type.startsWith('image/')) {
            await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async e => {
                    fileEntry.dataURL = e.target.result;
                    fileEntry.mimeType = file.type;
                    fileEntry.type = 'image';
                    try {
                        setStatus(`🔍 OCR en cours sur ${file.name}... (patientez 3-10s)`);
                        fileEntry.textContent = await performOCR(e.target.result);
                        fileEntry.status = 'ready';
                        renderFileList();
                        setStatus(`✅ ${file.name} analysé (${fileEntry.textContent.length} caractères)`);
                    } catch(err) {
                        fileEntry.status = 'error';
                        fileEntry.errorMsg = err.message;
                        renderFileList();
                        setStatus(`❌ Erreur OCR: ${err.message}`, true);
                    }
                    resolve();
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        } 
        else if (file.name.toLowerCase().endsWith('.docx')) {
            const buf = await file.arrayBuffer();
            const result = await mammoth.extractRawText({ arrayBuffer: buf });
            fileEntry.textContent = result.value;
            fileEntry.type = 'docx';
            fileEntry.status = 'ready';
            renderFileList();
            setStatus(`✅ ${file.name} chargé`);
        } else {
            fileEntry.status = 'error';
            renderFileList();
            setStatus('❌ Format non supporté', true);
        }
    } catch(e) {
        fileEntry.status = 'error';
        renderFileList();
        setStatus('❌ Erreur lors du chargement', true);
    }
}

// =====================================================
// MICROPHONE
// =====================================================
(function initVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;
    if (!voiceBtn || !SR) {
        if (voiceBtn) voiceBtn.style.display = 'none';
        return;
    }

    let recognition = null;
    let isRecording = false;
    let micStream = null;

    async function requestMicPermission() {
        if (micStream && micStream.getTracks().every(t => t.readyState === 'live')) {
            return true;
        }
        try {
            if (micStream) micStream.getTracks().forEach(t => t.stop());
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            micStream.getTracks().forEach(t => { t.enabled = true; });
            return true;
        } catch(e) {
            micStream = null;
            setStatus('❌ Accès microphone refusé', true);
            return false;
        }
    }

    function createRecognition() {
        const rec = new SR();
        rec.lang = 'fr-FR';
        rec.continuous = true;
        rec.interimResults = true;
        rec.maxAlternatives = 1;
        return rec;
    }

    function stopRecording() {
        isRecording = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.title = 'Dictée vocale';
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
            recognition = null;
        }
    }

    voiceBtn.addEventListener('click', async () => {
        if (isRecording) { stopRecording(); return; }

        const granted = await requestMicPermission();
        if (!granted) return;

        recognition = createRecognition();
        let finalTranscript = '';

        recognition.onresult = e => {
            let interim = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
                if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
                else interim += e.results[i][0].transcript;
            }
            userInput.value = (finalTranscript + interim).trim();
            updateCharCounter();
        };

        recognition.onend = () => {
            if (isRecording) {
                try { recognition.start(); } catch(e) { stopRecording(); }
            }
        };

        recognition.onerror = e => {
            if (e.error === 'no-speech') return;
            setStatus(`❌ Erreur micro: ${e.error}`, true);
            stopRecording();
        };

        try {
            recognition.start();
            isRecording = true;
            voiceBtn.classList.add('recording');
            voiceBtn.title = 'Cliquez pour arrêter';
            setStatus('🎤 Enregistrement en cours...');
        } catch(e) {
            setStatus('❌ Impossible de démarrer la dictée', true);
            stopRecording();
        }
    });
})();

// =====================================================
// API CALL
// =====================================================
async function callAPIStream(userText, onChunk, onDone, onError) {
    const model = modelSelect.value;
    if (!model) { onError('Sélectionnez un modèle'); return; }
    const provider = getProviderForModel(model);
    const apiKey = currentApiKeys[provider];
    if (!apiKey) { onError(`Clé ${providersConfig[provider]?.name} manquante`); return; }

    const conf = providersConfig[provider];
    const sessionMsgs = sessions.find(s=>s.id===currentSessionId)?.messages.slice(-12).map(m=>({role:m.role,content:m.content})) || [];

    let systemPrompt;
    if (currentAgent) {
        systemPrompt = `Tu es ${currentAgent.name}, un agent IA spécialisé.
Voici tes instructions : ${currentAgent.instructions || currentAgent.desc}
Reste dans ce rôle en toutes circonstances. Ne mentionne jamais DAKIS. Réponds en Markdown si pertinent.`;
    } else {
        systemPrompt = "Tu es DAKIS, assistant IA professionnel et utile. Réponds en Markdown si pertinent.";
    }
    const memories = getRelevantMemories(userText);
    if (memories.length) systemPrompt += `\n\n[Contexte mémoire: ${memories.map(m=>m.content).join('; ')}]`;

    const messages = [{role:'system',content:systemPrompt}, ...sessionMsgs, {role:'user',content:userText}];

    const temperature = (currentAgent?.temperature !== undefined) ? currentAgent.temperature : 0.7;
    const body = JSON.stringify({ model, messages, temperature, max_tokens:4000, stream:true });

    try {
        setStatus('⏳ DAKIS réfléchit...');
        const resp = await fetch(conf.baseURL, { method:'POST', headers:conf.headers(apiKey), body });
        if (!resp.ok) { onError(`HTTP ${resp.status}`); return; }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        let fullContent = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data:')) continue;
                const data = line.slice(5).trim();
                if (data === '[DONE]') { onDone(fullContent); return; }
                try {
                    const parsed = JSON.parse(data);
                    const delta = parsed.choices?.[0]?.delta?.content || '';
                    if (delta) { fullContent += delta; onChunk(delta, fullContent); }
                } catch(e) {}
            }
        }
        onDone(fullContent);
    } catch(e) { onError(e.message); }
}

// =====================================================
// handleSend
// =====================================================
async function handleSend() {
    const msg = userInput.value.trim();
    const readyFiles = attachedFiles.filter(f => f.status === 'ready');
    if (!msg && !readyFiles.length) { setStatus('✍️ Écrivez un message', true); return; }

    const fileNames = readyFiles.map(f=>f.fileName);
    const displayMsg = msg + (fileNames.length ? `\n\n📎 [${fileNames.join(', ')}]` : '');
    addMessage('user', displayMsg);
    userInput.value = '';
    updateCharCounter();
    const filesToProcess = [...readyFiles];
    attachedFiles = [];
    renderFileList();

    let finalMsg = msg || 'Analyse ce(s) document(s)';
    filesToProcess.forEach(f => {
        if (f.type === 'docx' || f.type === 'pdf' || f.type === 'image') {
            const MAX_FILE_CHARS = 8000;
            const truncated = f.textContent.length > MAX_FILE_CHARS
                ? f.textContent.substring(0, MAX_FILE_CHARS) + '\n[... contenu tronqué pour la limite de contexte]'
                : f.textContent;
            finalMsg += `\n\n=== CONTENU DU FICHIER "${f.fileName}" ===\n${truncated}\n=== FIN ===`;
        }
    });

    const botMsgDiv = document.createElement('div');
    botMsgDiv.className = 'message bot-message';
    const bubbleDiv = document.createElement('div');
    bubbleDiv.className = 'bubble bot-bubble';
    const cursor = document.createElement('span');
    cursor.className = 'streaming-cursor';
    bubbleDiv.appendChild(cursor);
    botMsgDiv.appendChild(bubbleDiv);
    messagesContainer.appendChild(botMsgDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;

    let streamedContent = '';

    callAPIStream(
        finalMsg,
        (delta, full) => {
            streamedContent = full;
            bubbleDiv.innerHTML = marked.parse(full);
            bubbleDiv.appendChild(cursor);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        },
        (full) => {
            cursor.remove();
            bubbleDiv.innerHTML = marked.parse(full || '...');
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'msg-actions';
            const ts = Date.now();
            actionsDiv.innerHTML = `
                <button class="msg-action-btn" onclick="window.copyMessage(${ts})"> Copier</button>
                <button class="msg-action-btn" onclick="window.saveToMemory(${ts})">🧠 Mémoriser</button>
                <button class="msg-action-btn" onclick="window.regenerateMessage(${ts})">🔄 Régénérer</button>
                <button class="msg-action-btn" onclick="window.exportMessage(${ts})">💾 Export</button>
            `;
            const timeDiv = document.createElement('div');
            timeDiv.style.cssText = 'font-size:0.7rem;opacity:0.6;margin-top:4px;';
            timeDiv.textContent = new Date().toLocaleTimeString();
            botMsgDiv.appendChild(actionsDiv);
            botMsgDiv.appendChild(timeDiv);

            const sess = sessions.find(s=>s.id===currentSessionId);
            if (sess) {
                sess.messages.push({role:'assistant',content:full,timestamp:ts});
                saveCurrentMessages(sess.messages);
            }
            setStatus('');

            const hasDoc = filesToProcess.some(f=>f.type==='docx' || f.type==='pdf' || f.type==='image');
            if (hasDoc) showCopyPanel(full);
        },
        (errMsg) => {
            cursor.remove();
            bubbleDiv.innerHTML = `<span style="color:#e74c3c;">❌ Erreur API : ${escapeHtml(errMsg)}</span>`;
            setStatus(`❌ ${errMsg}`, true);
        }
    );
}

// =====================================================
// COPY PANEL
// =====================================================
function showCopyPanel(content) {
    const panel = document.createElement('div');
    panel.className = 'copy-result-panel';
    panel.innerHTML = `
        <div style="font-size:0.8rem;font-weight:600;color:var(--accent);margin-bottom:8px;">📋 Résultat — copiez et collez dans Word</div>
        <textarea class="copy-result-text" readonly>${escapeHtml(content)}</textarea>
        <button class="copy-clipboard-btn" id="copyToCb">📋 Copier dans le presse-papiers</button>`;
    messagesContainer.appendChild(panel);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;

    panel.querySelector('#copyToCb').addEventListener('click', function() {
        navigator.clipboard.writeText(content).then(() => {
            this.textContent = '✅ Copié !';
            this.classList.add('copied');
            setTimeout(() => { this.textContent = ' Copier dans le presse-papiers'; this.classList.remove('copied'); }, 2500);
        }).catch(() => {
            panel.querySelector('.copy-result-text').select();
            setStatus('Sélectionnez le texte et copiez (Ctrl+C)', false);
        });
    });
}

if (wizardAgentBtn) wizardAgentBtn.onclick = () => { wizardModal.classList.add('active'); wizardResult.style.display='none'; wizardDesc.value=''; };

if (wizardGenerateBtn) {
    wizardGenerateBtn.onclick = async () => {
        const desc = wizardDesc.value.trim();
        if (!desc) { setStatus("❌ Décrivez l'agent", true); return; }
        
        const apiKey = currentApiKeys.mistral || currentApiKeys.groq || currentApiKeys.deepseek || currentApiKeys.openrouter;
        const provider = currentApiKeys.mistral ? 'mistral' : currentApiKeys.groq ? 'groq' : currentApiKeys.deepseek ? 'deepseek' : 'openrouter';
        
        if (!apiKey) { setStatus('❌ Aucune clé API configurée. Ajoutez au moins une clé dans les paramètres.', true); return; }
        
        wizardGenerateBtn.disabled = true; wizardGenerateBtn.textContent = ' Génération...';
        try {
            const conf = providersConfig[provider];
            const model = conf.models[0];
            const resp = await fetch(conf.baseURL, {
                method:'POST', headers: conf.headers(apiKey),
                body: JSON.stringify({ 
                    model: model, 
                    messages:[{role:'user',content:`Génère UNIQUEMENT un objet JSON valide (sans texte avant/après) avec ces champs obligatoires: name, desc, instructions, temperature. Format EXACT: {"name":"...","desc":"...","instructions":"...","temperature":0.7}. Description: ${desc}`}], 
                    max_tokens:1000 
                })
            });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            const content = data.choices[0].message.content;
            let jsonMatch = content.match(/\{[\s\S]*\}/);
            if (!jsonMatch) {
                const jsonStart = content.indexOf('{');
                const jsonEnd = content.lastIndexOf('}');
                if (jsonStart === -1 || jsonEnd === -1) throw new Error('Aucun JSON trouvé');
                jsonMatch = content.substring(jsonStart, jsonEnd + 1);
            } else {
                jsonMatch = jsonMatch[0];
            }
            const agent = JSON.parse(jsonMatch);
            agent.id = Date.now().toString(); agent.created = Date.now();
            agents.push(agent); saveAgents(); renderAgents();
            wizardResult.style.display='block';
            wizardResult.innerHTML = `<div style="background:rgba(0,0,0,0.2);border-radius:12px;padding:12px;"><strong>✅ Agent créé : ${escapeHtml(agent.name)}</strong><br>${escapeHtml(agent.desc)}</div>`;
            setStatus(`Agent "${agent.name}" créé !`);
        } catch(e) {
            wizardResult.style.display='block';
            wizardResult.innerHTML = `<div style="color:var(--danger);">❌ Erreur de génération : ${escapeHtml(e.message)}. Réessayez.</div>`;
        }
        wizardGenerateBtn.disabled=false; wizardGenerateBtn.textContent='🚀 Générer l\'agent';
    };
}

if (focusModeBtn) {
    focusModeBtn.addEventListener('click', () => {
        document.body.classList.toggle('focus-mode');
        focusModeBtn.textContent = document.body.classList.contains('focus-mode') ? '🖥️ Quitter Focus' : '🖥️ Focus';
    });
}

document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); handleSend(); }
    else if (e.ctrlKey && e.key === 'n') { e.preventDefault(); newChat(); }
    else if (e.ctrlKey && e.key === '/') { e.preventDefault(); userInput.focus(); }
    else if (e.key === 'F11') { e.preventDefault(); focusModeBtn.click(); }
    else if (e.key === 'Escape' && document.body.classList.contains('focus-mode')) {
        document.body.classList.remove('focus-mode');
        focusModeBtn.textContent = '️ Focus';
    }
});
